name: CI
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Vet
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Checkout submodules
        run: |
          git submodule sync --recursive
          git -c "http.extraheader=AUTHORIZATION: bearer ${{ github.token }}" submodule update --init --force --depth=1 --recursive
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache: true
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: backend
      - name: go vet
        run: go vet ./...

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [lint]
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Checkout submodules
        run: |
          git submodule sync --recursive
          git -c "http.extraheader=AUTHORIZATION: bearer ${{ github.token }}" submodule update --init --force --depth=1 --recursive
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache: true
      - name: Run unit tests
        run: go test -v -count=1 -race -shuffle=on -coverprofile=coverage.out -covermode=atomic \
              ./internal/crypto/... \
              ./internal/config/... \
              ./internal/errors/... \
              ./internal/backup/... \
              ./internal/restore/... \
              ./pkg/storage/... \
              ./internal/middleware/... \
              ./internal/database/tenant/...
      - name: Check coverage threshold
        if: always()
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "Total coverage: $COVERAGE%"
          if (( $(echo "$COVERAGE < 30" | bc -l) )); then
            echo "Coverage $COVERAGE% is below threshold of 30%"
            exit 1
          fi
        working-directory: backend

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [lint]
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: schoolcare
          POSTGRES_PASSWORD: schoolcare
          POSTGRES_DB: schoolcare
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Checkout submodules
        run: |
          git submodule sync --recursive
          git -c "http.extraheader=AUTHORIZATION: bearer ${{ github.token }}" submodule update --init --force --depth=1 --recursive
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache: true
      - name: Run integration tests
        run: go test -v -count=1 -race -shuffle=on -tags=integration \
              ./internal/middleware/... \
              ./internal/database/tenant/...
      - name: Upload test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-output
          path: /tmp/integration-output.txt
          if-no-files-found: ignore

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint]
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Checkout submodules
        run: |
          git submodule sync --recursive
          git -c "http.extraheader=AUTHORIZATION: bearer ${{ github.token }}" submodule update --init --force --depth=1 --recursive
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache: true
      - name: Build
        run: go build -o /dev/null ./cmd/server
