name: CI
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# Shared submodule checkout — reused across jobs
env:
  SUBMODULE_ARGS: >
    git submodule sync --recursive
    && git -c "http.extraheader=AUTHORIZATION: bearer ${{ github.token }}"
      submodule update --init --force --depth=1 --recursive

jobs:
  # ── Vet ──────────────────────────────────────────────────────────────────
  # Replaces golangci-lint which is incompatible with Go 1.26.
  vet:
    name: Vet
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Checkout submodules
        run: ${{ env.SUBMODULE_ARGS }}
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache: true
      - name: go vet
        run: go vet ./...

  # ── Backend Tests ─────────────────────────────────────────────────────────
  # Runs all module unit tests with race detection, coverage, and threshold.
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: [vet]
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Checkout submodules
        run: ${{ env.SUBMODULE_ARGS }}
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache: true
      - name: Run unit tests
        run: >
          go test -short -race -count=1 -shuffle=on
          -coverprofile=coverage.out -covermode=atomic
          ./internal/modules/... ./internal/backup/... ./internal/restore/...
      - name: Check coverage threshold (5%)
        if: always()
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "Total coverage: $COVERAGE%"
          if (( $(echo "$COVERAGE < 5" | bc -l) )); then
            echo "Coverage $COVERAGE% is below threshold of 5%"
            exit 1
          fi
          echo "Coverage $COVERAGE% meets threshold of 5%"

  # ── Frontend ──────────────────────────────────────────────────────────────
  # TypeScript typecheck, build, and vitest tests.
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - name: Checkout submodules
        run: ${{ env.SUBMODULE_ARGS }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Enable corepack (Yarn 4)
        run: corepack enable
      - name: Cache Yarn dependencies
        uses: actions/cache@v4
        with:
          path: frontend/.yarn/cache
          key: yarn-${{ hashFiles('frontend/yarn.lock') }}
          restore-keys: yarn-
      - name: Install dependencies
        run: corepack yarn install --immutable
      - name: Type check
        run: corepack yarn typecheck
      - name: Build
        run: corepack yarn build
      - name: Test
        run: corepack yarn test

  # ── Build ─────────────────────────────────────────────────────────────────
  # Full module compilation (not just cmd/server).
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [vet]
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Checkout submodules
        run: ${{ env.SUBMODULE_ARGS }}
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache: true
      - name: Build all modules
        run: go build ./...
